<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Figura levantando rodilla -->
    <circle cx="60" cy="16" r="11" fill="#FFD166"/>
    <rect x="54" y="27" width="12" height="30" rx="6" fill="#FFD166"/>
    <!-- Brazos equilibrio -->
    <line x1="54" y1="36" x2="28" y2="44" stroke="#FFD166" stroke-width="7" stroke-linecap="round"/>
    <line x1="66" y1="36" x2="92" y2="44" stroke="#FFD166" stroke-width="7" stroke-linecap="round"/>
    <!-- Pierna de apoyo -->
    <line x1="57" y1="57" x2="54" y2="90" stroke="#FFD166" stroke-width="7" stroke-linecap="round"/>
    <!-- Pierna levantada (rodilla al pecho) -->
    <path d="M63 57 Q78 57 80 72 Q82 80 70 84" stroke="#FF6B2B" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Círculo tobillo -->
    <circle cx="54" cy="90" r="6" fill="none" stroke="#1DB954" stroke-width="2.5" stroke-dasharray="4,3"/>
    <polygon points="50,85 58,82 58,90" fill="#1DB954"/>
    <!-- Flecha hacia arriba -->
    <path d="M86 34 L86 18" stroke="#4ECDC4" stroke-width="2.5"/>
    <polygon points="82,20 86,12 90,20" fill="#4ECDC4"/>
