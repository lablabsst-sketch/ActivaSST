<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Figura de pie con brazos al remo -->
    <circle cx="60" cy="16" r="11" fill="#FF6B2B"/>
    <rect x="54" y="27" width="12" height="28" rx="6" fill="#FF6B2B"/>
    <!-- Brazo izquierdo extendido -->
    <line x1="54" y1="34" x2="18" y2="50" stroke="#FF6B2B" stroke-width="7" stroke-linecap="round"/>
    <!-- Brazo derecho extendido -->
    <line x1="66" y1="34" x2="102" y2="50" stroke="#FF6B2B" stroke-width="7" stroke-linecap="round"/>
    <!-- Flecha remo izquierda -->
    <path d="M18 50 Q30 42 40 50" fill="none" stroke="#FFD166" stroke-width="2.5"/>
    <polygon points="37,46 44,52 38,56" fill="#FFD166"/>
    <!-- Flecha remo derecha -->
    <path d="M102 50 Q90 42 80 50" fill="none" stroke="#FFD166" stroke-width="2.5"/>
    <polygon points="83,46 76,52 82,56" fill="#FFD166"/>
    <!-- Hombros marcados -->
    <circle cx="50" cy="30" r="6" fill="none" stroke="#1DB954" stroke-width="2.5"/>
    <circle cx="70" cy="30" r="6" fill="none" stroke="#1DB954" stroke-width="2.5"/>
    <!-- Piernas -->
    <line x1="57" y1="55" x2="50" y2="84" stroke="#FF6B2B" stroke-width="7" stroke-linecap="round"/>
    <line x1="63" y1="55" x2="70" y2="84" stroke="#FF6B2B" stroke-width="7" stroke-linecap="round"/>
    <text x="60" y="110" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">HOMBROS</text>
  </svg>
