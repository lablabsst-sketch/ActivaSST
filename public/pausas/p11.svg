<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Sol de energía -->
    <circle cx="60" cy="22" r="14" fill="#FFD166" opacity="0.9"/>
    <!-- Rayos -->
    <line x1="60" y1="4" x2="60" y2="0" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="78" y1="10" x2="80" y2="7" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="10" x2="40" y2="7" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Figura con brazos en X (calentamiento) -->
    <circle cx="60" cy="52" r="10" fill="#1DB954"/>
    <rect x="55" y="62" width="10" height="24" rx="5" fill="#1DB954"/>
    <!-- Brazo derecho arriba derecha -->
    <line x1="65" y1="58" x2="88" y2="40" stroke="#1DB954" stroke-width="7" stroke-linecap="round"/>
    <!-- Brazo izquierdo arriba izquierda -->
    <line x1="55" y1="58" x2="32" y2="40" stroke="#1DB954" stroke-width="7" stroke-linecap="round"/>
    <!-- Piernas separadas (posición de inicio) -->
    <line x1="57" y1="86" x2="46" y2="108" stroke="#1DB954" stroke-width="7" stroke-linecap="round"/>
    <line x1="63" y1="86" x2="74" y2="108" stroke="#1DB954" stroke-width="7" stroke-linecap="round"/>
    <!-- Círculos de energía -->
    <circle cx="60" cy="52" r="20" fill="none" stroke="#FFD166" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
    <circle cx="60" cy="52" r="32" fill="none" stroke="#FFD166" stroke-width="1" stroke-dasharray="3,6" opacity="0.25"/>
    <text x="60" y="120" text-anchor="middle" fill="#888" font-size="7.5" font-family="monospace">CALENTAMIENTO</text>
  </svg>
